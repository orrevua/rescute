name: security-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Audit frontend dependencies (fail on high/critical)
        run: npm audit --audit-level=high
